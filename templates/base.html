<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% block title %}The Smoked Soul | Private Chef & Event Dining in Texas{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}The Smoked Soul offers private chef dinners, event dining, and culinary consulting rooted in Texas fire, disciplined service, and generous hospitality.{% endblock %}">
  <meta name="robots" content="{% block robots %}index, follow{% endblock %}">
  <link rel="canonical" href="{% block canonical_url %}{{ request.base_url }}{% endblock %}">

  <meta property="og:site_name" content="The Smoked Soul">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="en_US">
  <meta property="og:title" content="{{ self.title()|striptags|trim }}">
  <meta property="og:description" content="{{ self.meta_description()|striptags|trim }}">
  <meta property="og:url" content="{{ request.base_url }}">
  <meta property="og:image" content="{% block og_image %}{{ url_for('static', filename='images/header.jpg', _external=True) }}{% endblock %}">
  <meta property="og:image:alt" content="{% block og_image_alt %}Chef-led smoked dining experience from The Smoked Soul{% endblock %}">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ self.title()|striptags|trim }}">
  <meta name="twitter:description" content="{{ self.meta_description()|striptags|trim }}">
  <meta name="twitter:image" content="{{ self.og_image()|striptags|trim }}">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "@id": {{ (request.base_url ~ "#webpage")|tojson }},
    "url": {{ request.base_url|tojson }},
    "name": {{ self.title()|striptags|trim|tojson }},
    "description": {{ self.meta_description()|striptags|trim|tojson }},
    "isPartOf": {
      "@type": "WebSite",
      "@id": {{ (url_for('home', _external=True) ~ "#website")|tojson }},
      "name": "The Smoked Soul",
      "url": {{ url_for('home', _external=True)|tojson }}
    },
    "about": {
      "@type": "Organization",
      "@id": {{ (url_for('home', _external=True) ~ "#organization")|tojson }},
      "name": "The Smoked Soul"
    },
    "inLanguage": "en-US"
  }
  </script>
  {% block structured_data %}{% endblock %}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>

  <header class="site-header" id="top">
    <a class="brand" href="/" aria-label="The Smoked Soul home">
      <img class="brand-logo" src="{{ url_for('static', filename='images/the-smoked-soul-logo.png') }}" alt="The Smoked Soul logo">
      <span>The Smoked Soul</span>
    </a>

    <nav class="main-nav" aria-label="Main navigation">
      <a href="/">Home</a>
      <a href="/story">Story</a>
      <a href="/experience">Experience</a>
      <a href="/goods">Goods</a>
    </nav>

    <a class="nav-cta" href="/#booking">Book</a>
  </header>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div>
      <a class="brand footer-brand" href="/">
        <img class="brand-logo" src="{{ url_for('static', filename='images/the-smoked-soul-logo.png') }}" alt="The Smoked Soul logo">
        <span>The Smoked Soul</span>
      </a>
      <p>Private chef, events, and consulting rooted in Texas fire and discipline.</p>
    </div>

    <div class="footer-links">
      <a href="/#services">Services</a>
      <a href="/#events">Events</a>
      <a href="/#consulting">Consulting</a>
      <a href="/#booking">Book</a>
    </div>
    </footer>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
